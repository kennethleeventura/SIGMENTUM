<style>
  :root {
    /* Monochrome base — paper / ivory */
    --paper: #f5f5f2;
    --paper-2: #ebebe6;
    --paper-3: #dedcd4;
    --ink: #0b0d12;
    --ink-2: #20242e;
    --ink-3: #3a4050;
    --ink-4: #6a7080;
    --ink-5: #a0a5b3;
    --line: rgba(11,13,18,0.08);
    --line-strong: rgba(11,13,18,0.14);

    /* Brand — logo-derived */
    --orange: #ee6a13;       /* SIGNALS */
    --orange-soft: #ff8a3d;
    --orange-glow: rgba(238,106,19,0.18);
    --green: #0fb864;        /* MOMENTUM */
    --green-soft: #3dd98a;
    --green-glow: rgba(15,184,100,0.16);
    --blue: #0b5dee;         /* brand accent, sparse use */
    --blue-glow: rgba(11,93,238,0.08);
    --inner-card: rgba(255,255,255,0.55);
    --inner-card-strong: rgba(255,255,255,0.7);

    /* Glass */
    --glass-bg: rgba(255,255,255,0.55);
    --glass-bg-strong: rgba(255,255,255,0.75);
    --glass-border: rgba(255,255,255,0.85);
    --glass-stroke: rgba(11,13,18,0.06);
    --glass-blur: 22px;
    --glass-sat: 160%;

    --shadow-sm: 0 1px 2px rgba(11,13,18,0.04), 0 1px 1px rgba(11,13,18,0.03);
    --shadow-md: 0 10px 30px -12px rgba(11,13,18,0.15), 0 2px 6px rgba(11,13,18,0.05);
    --shadow-lg: 0 30px 60px -20px rgba(11,13,18,0.25), 0 8px 20px rgba(11,13,18,0.06);
    --shadow-glow-o: 0 20px 60px -15px var(--orange-glow);
    --shadow-glow-g: 0 20px 60px -15px var(--green-glow);

    --radius-sm: 8px;
    --radius: 14px;
    --radius-lg: 20px;
    --radius-xl: 28px;

    --font-sans: 'Space Grotesk', ui-sans-serif, system-ui, -apple-system, sans-serif;
    --font-serif: 'Instrument Serif', Georgia, serif;
    --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--font-sans);
    font-size: 15px;
    line-height: 1.5;
    letter-spacing: -0.005em;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* Ambient gradient wash — subtle paper texture + color bloom */
  body::before {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 0;
    background:
      radial-gradient(900px 600px at 12% 5%, rgba(238,106,19,0.08), transparent 60%),
      radial-gradient(1000px 700px at 88% 30%, rgba(15,184,100,0.07), transparent 60%),
      radial-gradient(800px 500px at 50% 110%, rgba(11,93,238,0.05), transparent 60%);
  }
  body::after {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image:
      linear-gradient(to right, rgba(11,13,18,0.035) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(11,13,18,0.035) 1px, transparent 1px);
    background-size: 56px 56px;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
    opacity: 0.6;
  }

  #root { position: relative; z-index: 1; }

  /* Selection */
  ::selection { background: var(--orange); color: white; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--ink-5); border-radius: 10px; border: 2px solid var(--paper); }
  ::-webkit-scrollbar-thumb:hover { background: var(--ink-4); }

  /* Typography helpers */
  .eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-3);
  }
  .serif { font-family: var(--font-serif); font-weight: 500; letter-spacing: -0.015em; }
  .mono { font-family: var(--font-mono); font-feature-settings: "tnum" 1, "zero" 1; }

  /* Glass panel */
  .glass {
    background: var(--glass-bg);
    backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-sat));
    -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-sat));
    border: 1px solid var(--glass-stroke);
    box-shadow:
      inset 0 1px 0 var(--glass-border),
      var(--shadow-md);
    border-radius: var(--radius-lg);
  }
  .glass-strong {
    background: var(--glass-bg-strong);
  }

  /* Button */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--font-sans);
    font-weight: 500;
    font-size: 14px;
    padding: 10px 18px;
    border-radius: 999px;
    border: 1px solid var(--line-strong);
    background: white;
    color: var(--ink);
    cursor: pointer;
    transition: all 180ms ease;
    text-decoration: none;
    letter-spacing: -0.01em;
  }
  .btn:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }
  .btn-primary {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }
  .btn-primary:hover { background: var(--ink-2); }
  .btn-signal {
    background: var(--orange);
    color: white;
    border-color: var(--orange);
  }
  .btn-momentum {
    background: var(--green);
    color: white;
    border-color: var(--green);
  }
  .btn-signal-outline {
    background: transparent;
    color: var(--orange);
    border-color: var(--orange);
  }
  .btn-signal-outline:hover { background: rgba(238,106,19,0.08); }
  .btn-momentum-outline {
    background: transparent;
    color: var(--green);
    border-color: var(--green);
  }
  .btn-momentum-outline:hover { background: rgba(15,184,100,0.08); }

  /* Chip */
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-family: var(--font-mono);
    letter-spacing: 0.05em;
    background: rgba(255,255,255,0.6);
    border: 1px solid var(--glass-stroke);
    color: var(--ink-2);
  }
  .chip-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ink-4); }
  .chip-dot.signals { background: var(--orange); box-shadow: 0 0 0 3px var(--orange-glow); }
  .chip-dot.momentum { background: var(--green); box-shadow: 0 0 0 3px var(--green-glow); }
  .chip-dot.live { background: var(--orange); animation: pulse 1.6s ease-in-out infinite; }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 var(--orange-glow); }
    50% { box-shadow: 0 0 0 6px transparent; }
  }

  /* Tag for semantic */
  .tag-signal { color: var(--orange); }
  .tag-momentum { color: var(--green); }

  /* Entry motion — fade+rise on reveal */
  [data-reveal] {
    opacity: 0;
    transform: translateY(24px);
    transition: opacity 800ms cubic-bezier(.2,.7,.2,1), transform 800ms cubic-bezier(.2,.7,.2,1);
    transition-delay: var(--reveal-delay, 0ms);
  }
  [data-reveal].is-visible {
    opacity: 1;
    transform: translateY(0);
  }
  .no-motion [data-reveal] { opacity: 1; transform: none; transition: none; }

  /* Kbd */
  kbd {
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 4px;
    background: rgba(11,13,18,0.06);
    border: 1px solid var(--line-strong);
    color: var(--ink-2);
  }

  /* Utility */
  .container {
    width: 100%;
    max-width: 1360px;
    margin: 0 auto;
    padding: 0 32px;
  }
  @media (max-width: 768px) {
    .container { padding: 0 20px; }
  }

  /* Section rhythm */
  section { position: relative; padding: 96px 0; }
  section.container { padding: 96px 32px; }
  section.tight { padding: 48px 0; }
  section.tight.container { padding: 48px 32px; }
  @media (max-width: 768px) {
    section.container { padding: 72px 20px; }
  }
  section + section::before {
    content: '';
    position: absolute; top: 0; left: 10%; right: 10%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--line-strong), transparent);
  }

  /* Dark mode overrides */
  body.is-dark {
    background: var(--paper);
    color: var(--ink);
    --ink-2: #d8dbe3;
    --ink-3: #d0d4de;
    --ink-4: #a8adb8;
  }
  body.is-dark::before {
    background:
      radial-gradient(900px 600px at 12% 5%, rgba(238,106,19,0.10), transparent 60%),
      radial-gradient(1000px 700px at 88% 30%, rgba(15,184,100,0.08), transparent 60%),
      radial-gradient(800px 500px at 50% 110%, rgba(11,93,238,0.14), transparent 60%);
  }
  body.is-dark::after {
    background-image:
      linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
    opacity: 0.5;
  }
  body.is-dark .btn { background: rgba(255,255,255,0.06); color: var(--ink); border-color: var(--line-strong); }
  body.is-dark .btn-primary { background: var(--ink); color: #0a0d14; border-color: var(--ink); }
  body.is-dark .chip { background: rgba(11,93,238,0.08); color: var(--ink); }
  body.is-dark kbd { background: rgba(255,255,255,0.08); color: var(--ink); }
  body.is-dark ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-color: var(--paper); }

  /* Ticker */
  @keyframes ticker {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }
  .ticker-track {
    display: flex;
    gap: 48px;
    width: max-content;
    animation: ticker 60s linear infinite;
  }

  /* Sparkline polyline */
  .spark-line {
    fill: none;
    stroke-width: 1.6;
    stroke-linejoin: round;
    stroke-linecap: round;
  }

  /* Shimmer on AI reasoning text */
  @keyframes shimmer-text {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  .ai-text-shimmer {
    background: linear-gradient(
      90deg,
      var(--ink-3) 0%,
      var(--ink-3) 40%,
      var(--orange) 50%,
      var(--ink-3) 60%,
      var(--ink-3) 100%
    );
    background-size: 200% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: shimmer-text 3s linear infinite;
  }

  /* Number ticker */
  .num-roll { font-variant-numeric: tabular-nums; }

  /* Hover lift on cards */
  .lift { transition: transform 300ms cubic-bezier(.2,.7,.2,1), box-shadow 300ms; }
  .lift:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
</style>
